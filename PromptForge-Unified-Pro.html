<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PromptForge Unified Pro</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="theme-color" content="#1a1b23">
  <style>
    :root {
      --bg: #1a1b23; --surface: #21232b; --surface2: #282a33; --border: #33354a;
      --text: #e1e2e8; --text2: #a8a9b7; --accent: #6c8cff; --accent2: #4ef0c8;
      --danger: #ff5e7a; --warn: #ffb347; --success: #4ade80; --radius: 8px;
      --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --shadow: 0 2px 12px rgba(0,0,0,0.35); --transition: 0.2s ease;
    }
    .light-theme {
      --bg: #f5f6f8; --surface: #ffffff; --surface2: #eef0f4; --border: #d5d7e0;
      --text: #1a1b23; --text2: #5a5b6e; --accent: #4a6cf7; --accent2: #0ea882;
      --danger: #e0455e; --warn: #d98c20; --success: #2ca85e; --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-sans); line-height:1.5; transition: background var(--transition), color var(--transition); min-height:100vh; }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; flex-wrap:wrap; gap:10px; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
    header h1 { font-size:1.3rem; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; white-space:nowrap; }
    .theme-toggle { margin-left:auto; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:20px; cursor:pointer; font-size:0.85rem; transition:all var(--transition); }
    .theme-toggle:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .nav-desktop { display:flex; flex-wrap:wrap; gap:2px; background:var(--surface); border-bottom:1px solid var(--border); padding:6px 12px; position:sticky; top:54px; z-index:99; overflow-x:auto; }
    .nav-mobile { display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:8px 12px; position:sticky; top:54px; z-index:99; }
    @media (max-width:700px) { .nav-desktop { display:none; } .nav-mobile { display:block; } }
    .tab-btn { background:transparent; border:none; color:var(--text2); padding:8px 14px; cursor:pointer; border-radius:var(--radius); font-size:0.82rem; white-space:nowrap; transition:all var(--transition); font-family:var(--font-sans); }
    .tab-btn:hover { background:var(--surface2); color:var(--text); }
    .tab-btn.active { background:var(--accent); color:#fff; font-weight:600; }
    main { max-width:1300px; margin:0 auto; padding:20px; }
    .tab-content { display:none; animation:fadeIn 0.25s ease; }
    .tab-content.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:16px; box-shadow:var(--shadow); }
    h3 { color:var(--accent); margin-bottom:10px; font-size:1rem; }
    label { display:block; font-size:0.82rem; color:var(--text2); margin-bottom:3px; font-weight:500; }
    input,textarea,select { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:var(--radius); font-family:var(--font-sans); font-size:0.88rem; transition:border var(--transition); }
    textarea { font-family:var(--font-mono); font-size:0.8rem; min-height:70px; }
    input:focus,textarea:focus,select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(108,140,255,0.15); }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; font-size:0.85rem; font-weight:500; background:var(--surface2); color:var(--text); white-space:nowrap; transition:all var(--transition); }
    .btn:hover { filter:brightness(1.2); border-color:var(--accent); }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.success { background:var(--success); color:#000; border-color:var(--success); }
    .btn.danger { background:var(--danger); color:#fff; border-color:var(--danger); }
    .btn:disabled { opacity:0.5; pointer-events:none; }
    .chip { display:inline-block; padding:4px 10px; border-radius:14px; font-size:0.75rem; background:var(--surface2); border:1px solid var(--border); margin:2px; cursor:pointer; transition:all var(--transition); user-select:none; }
    .chip.checked { background:var(--accent); color:#fff; border-color:var(--accent); }
    .chip:focus-visible { outline:2px solid var(--accent); }
    .preview-box { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; font-family:var(--font-mono); font-size:0.78rem; white-space:pre-wrap; max-height:400px; overflow-y:auto; }
    .inline-msg { padding:8px 14px; border-radius:var(--radius); font-size:0.82rem; margin-top:6px; display:none; }
    .inline-msg.show { display:block; }
    .inline-msg.info { background:rgba(108,140,255,0.12); border:1px solid var(--accent); color:var(--accent); }
    .inline-msg.ok { background:rgba(74,222,128,0.12); border:1px solid var(--success); color:var(--success); }
    .inline-msg.err { background:rgba(255,94,122,0.12); border:1px solid var(--danger); color:var(--danger); }
    .progress-bar { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; margin:6px 0; }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; width:0%; transition:width 0.4s ease; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    @media (max-width:800px) { .grid-2,.grid-3 { grid-template-columns:1fr; } .row { flex-direction:column; } }
    .mindmap-svg { width:100%; height:500px; }
    .metric-card { text-align:center; padding:12px; background:var(--surface2); border-radius:var(--radius); }
    .metric-card .val { font-size:1.8rem; font-weight:700; color:var(--accent); }
    .metric-card .lbl { font-size:0.72rem; color:var(--text2); }
    .card-prompt { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; cursor:pointer; transition:all var(--transition); }
    .card-prompt:hover { border-color:var(--accent); }
  </style>
</head>
<body>
<header>
  <h1>⚡ PromptForge Unified Pro</h1>
  <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">🌓 Тема</button>
</header>

<nav class="nav-desktop" id="navDesktop" role="tablist" aria-label="Основные разделы"></nav>
<div class="nav-mobile" id="navMobile"></div>

<main id="mainContent"></main>

<script>
(function() {
  // ==================== CONSTANTS ====================
  const STORAGE_KEY = 'pf_unified_pro_v2';
  const TABS = [
    { id:'constructor', icon:'🔧', label:'Конструктор' },
    { id:'library', icon:'📚', label:'Библиотека' },
    { id:'pentaum', icon:'🔍', label:'Penta‑Um' },
    { id:'stomagen', icon:'🦷', label:'StomaGen' },
    { id:'saas', icon:'🚀', label:'SaaS‑мастер' },
    { id:'mindmap', icon:'🗺️', label:'Граф' },
    { id:'builder', icon:'📦', label:'Сборщик' },
    { id:'summary', icon:'📊', label:'Сводка' },
    { id:'guide', icon:'📖', label:'Обучение' },
    { id:'workspace', icon:'💼', label:'Воркспейс' }
  ];

  // ==================== STATE MANAGER ====================
  const AppState = {
    data: {
      theme: 'dark',
      activeTab: 'constructor',
      cRole:'', cTask:'', cContext:'', cConstraints:'', cExamples:'', cExtra:'',
      cFormat:'text', cTemp:1, cTopP:0.9, cMaxTok:2048, cTechniques:[],
      myPrompts: [],
      libCat: 'universal',
      saasChecklist: Array(12).fill(false),
      saasRoadmap: Array(4).fill(0),
      saasCac:'', saasLtv:'', saasChurn:'', saasConv:'',
      proj: { name:'', client:'', desc:'', goals:'', tools:'', deadline:'', budget:'', context:'', format:'Документация', notes:'' },
      wsNotes:'', wsFileContent:'',
      pentaInput:'', pentaScore:0,
      summaryRecs:[]
    },
    listeners: {},
    on(key, cb) { if(!this.listeners[key]) this.listeners[key]=[]; this.listeners[key].push(cb); },
    set(key, value) {
      this.data[key] = value;
      if(this.listeners[key]) this.listeners[key].forEach(cb=>cb(value));
      this.debouncedSave();
    },
    get(key) { return this.data[key]; },
    debouncedSave: (function() { let t; return function() { clearTimeout(t); t = setTimeout(()=>AppState.persist(),300); }; })(),
    persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); } catch(e) { if(e.name==='QuotaExceededError') showMessage('msgCopy','Локальное хранилище переполнено','err'); } },
    load() {
      try { const r=localStorage.getItem(STORAGE_KEY); if(r){ const p=JSON.parse(r); this.data={...this.data,...p}; } } catch(e) {}
    },
    bindElement(id, stateKey, event='input', transform=null) {
      const el = document.getElementById(id);
      if(!el) return;
      // set initial value
      let val = this.data[stateKey];
      if(el.type==='checkbox') el.checked = !!val;
      else el.value = val !== undefined ? val : '';
      el.addEventListener(event, () => {
        let v = el.value;
        if(el.type==='checkbox') v = el.checked;
        else if(el.type==='range') v = parseFloat(v);
        if(transform) v = transform(v);
        this.set(stateKey, v);
      });
    }
  };
  AppState.load();
  if(AppState.data.theme==='light') document.body.classList.add('light-theme');

  // ==================== UI HELPERS ====================
  function showMessage(id, text, cls='info', duration=3000) {
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = text; el.className = `inline-msg show ${cls}`;
    setTimeout(()=>{ el.className = 'inline-msg'; }, duration);
  }
  function escapeHTML(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
  function estimateTokens(text) {
    if(!text) return 0;
    let tokens=0;
    for(let c of text) { tokens += c.charCodeAt(0)>127 ? 0.4 : 0.25; }
    return Math.ceil(tokens);
  }

  // ==================== BUILD UI ====================
  function renderTabs() {
    const desktop = document.getElementById('navDesktop');
    const mobile = document.getElementById('navMobile');
    desktop.innerHTML = TABS.map(t=>`<button class="tab-btn${AppState.data.activeTab===t.id?' active':''}" data-tab="${t.id}" role="tab" aria-selected="${AppState.data.activeTab===t.id}" aria-controls="panel-${t.id}">${t.icon} ${t.label}</button>`).join('');
    mobile.innerHTML = `<select id="mobileTabSelect" aria-label="Выбор раздела">${TABS.map(t=>`<option value="${t.id}" ${AppState.data.activeTab===t.id?'selected':''}>${t.icon} ${t.label}</option>`).join('')}</select>`;
    document.getElementById('mobileTabSelect').addEventListener('change', function() { switchTab(this.value); });
  }
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
    const target = document.getElementById('panel-'+tabId);
    if(target) target.classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b=>{ b.classList.remove('active'); if(b.dataset.tab===tabId) b.classList.add('active'); });
    const mob = document.getElementById('mobileTabSelect'); if(mob) mob.value=tabId;
    AppState.set('activeTab', tabId);
    if(tabId==='mindmap') renderMindmap();
    if(tabId==='summary') updateSummary();
    window.scrollTo({top:0, behavior:'smooth'});
  }
  renderTabs();
  document.getElementById('navDesktop').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn'); if(btn) switchTab(btn.dataset.tab);
  });

  // ==================== SECTIONS HTML ====================
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="tab-content active" id="panel-constructor">
      <div class="row">
        <div class="card" style="flex:2"><h3>🧩 Конструктор промптов</h3>
          <div class="row"><div><label for="cRole">Роль</label><input id="cRole"></div><div><label for="cTask">Задача</label><input id="cTask"></div></div>
          <label for="cContext">Контекст</label><textarea id="cContext" rows="2"></textarea>
          <div class="row"><div><label for="cConstraints">Ограничения</label><input id="cConstraints"></div><div><label for="cExamples">Примеры</label><input id="cExamples"></div></div>
          <label for="cExtra">Доп. инструкции</label><input id="cExtra">
          <div class="row">
            <div><label for="cFormat">Формат вывода</label><select id="cFormat"><option value="text">Plain Text</option><option value="json">JSON</option><option value="markdown">Markdown</option></select></div>
            <div><label>Температура <span id="tempVal">1.00</span></label><input type="range" id="cTemp" min="0" max="2" step="0.01" value="1"></div>
            <div><label>Top-P <span id="topPVal">0.90</span></label><input type="range" id="cTopP" min="0" max="1" step="0.01" value="0.9"></div>
            <div><label>Max Tokens <span id="maxTokVal">2048</span></label><input type="range" id="cMaxTok" min="100" max="4096" step="1" value="2048"></div>
          </div>
          <label>Техники</label><div id="techniquesGrid" class="grid-4"></div>
        </div>
        <div class="card" style="flex:1.3">
          <h3>👁️ Превью</h3><div class="preview-box" id="previewBox"></div>
          <div>≈ <span id="tokenEst">0</span> токенов</div>
          <button class="btn primary" id="btnCopyPrompt">📋 Копировать</button>
          <button class="btn danger" id="btnClearPrompt">🗑️ Очистить</button>
          <div class="inline-msg" id="msgCopy"></div>
        </div>
      </div>
    </div>
    <!-- Остальные панели будут вставлены ниже -->
  `;
  // Добавляем остальные панели
  const otherPanels = `
    <div class="tab-content" id="panel-library"><div class="card"><h3>📚 Библиотека промптов</h3>
      <div class="row" id="libCatBtns"><button class="btn active" data-libcat="universal">Универсальные</button><button class="btn" data-libcat="freelance">Фриланс</button><button class="btn" data-libcat="projects">Проекты</button><button class="btn" data-libcat="my">Моя библиотека</button></div>
      <div class="grid-3" id="libGrid"></div>
      <div id="myLibSection" style="display:none"><h4>Моя библиотека</h4>
        <button class="btn primary" id="btnAddMyPrompt">➕ Добавить</button>
        <button class="btn" id="btnMergePrompts">🔗 Сшить выбранные</button>
        <button class="btn" id="btnExportLib">📤 Экспорт</button>
        <button class="btn" id="btnImportLib">📥 Импорт</button><input type="file" id="importLibFile" accept=".json" style="display:none">
        <div class="grid-3" id="myLibGrid"></div>
      </div>
      <div class="inline-msg" id="msgLib"></div>
      <div class="card" id="editMyPromptCard" style="display:none"><h4>✏️ Редактировать промпт</h4>
        <div class="row"><div><label>Название</label><input id="editMyName"></div><div><label>Роль</label><input id="editMyRole"></div></div>
        <label>Описание</label><input id="editMyDesc"><label>Полный текст</label><textarea id="editMyFull" rows="4"></textarea>
        <button class="btn success" id="btnSaveMyPrompt">💾 Сохранить</button><button class="btn" id="btnCancelEdit">Отмена</button>
      </div>
    </div></div>
    <div class="tab-content" id="panel-pentaum"><div class="card"><h3>🔍 Penta‑Um анализатор планов</h3><textarea id="pentaInput" rows="6" placeholder="Введите долгосрочный план..."></textarea>
    <button class="btn primary" id="btnPentaAnalyze">🔬 Анализировать</button><div id="pentaResult"></div><div class="inline-msg" id="msgPenta"></div></div></div>
    <div class="tab-content" id="panel-stomagen"><div class="card"><h3>🦷 StomaGen — генератор цепочек промптов</h3>
      <div class="row"><div><label>Специализация</label><select id="sgSpec"><option>Терапия</option><option>Ортопедия</option><option>Ортодонтия</option><option>Хирургия</option></select></div>
      <div><label>Роль</label><select id="sgRole"><option>Врач-стоматолог</option><option>Ассистент</option></select></div>
      <div><label>Тон</label><select id="sgTone"><option>Профессиональный</option><option>Дружелюбный</option></select></div>
      <div><label>Формат</label><select id="sgFormat"><option>Инструкция</option><option>Скрипт разговора</option></select></div></div>
      <div class="row"><div><label>KPI</label><input id="sgKpi" placeholder="через запятую"></div><div><label>Стоп-фразы</label><input id="sgStop" placeholder="через запятую"></div></div>
      <button class="btn primary" id="btnStomaGen">🦷 Сгенерировать</button><div id="stomaResults"></div></div></div>
    <div class="tab-content" id="panel-saas"><div class="card"><h3>🚀 SaaS‑мастер</h3>
      <h4>Чек-лист зрелости (12 пунктов)</h4><div class="grid-3" id="saasChecklistGrid"></div>
      <div class="progress-bar"><div class="progress-fill" id="saasCheckBar"></div></div><span>Прогресс: <span id="saasCheckPct">0</span>%</span>
      <h4>Дорожная карта (4 этапа)</h4><div id="saasRoadmapGrid"></div>
      <div class="progress-bar"><div class="progress-fill" id="saasRoadBar"></div></div><span>Прогресс: <span id="saasRoadPct">0</span>%</span>
      <h4>Генератор промптов SaaS</h4><div class="row"><div><label>Категория</label><select id="saasCat"><option>Контент</option><option>Email</option><option>Реклама</option><option>SQL-запросы</option><option>Анализ оттока</option></select></div><div><label>Тема</label><input id="saasTopic"></div></div>
      <button class="btn primary" id="btnSaasGen">⚡ Сгенерировать</button><div class="preview-box" id="saasGenOut" style="margin-top:6px;max-height:120px;"></div>
      <h4>Метрики</h4><div class="row"><div><label>CAC ($)</label><input type="number" id="saasCac" step="0.01"></div><div><label>LTV ($)</label><input type="number" id="saasLtv" step="0.01"></div><div><label>Churn (%)</label><input type="number" id="saasChurn" step="0.01"></div><div><label>Конверсия (%)</label><input type="number" id="saasConv" step="0.01"></div></div>
      <button class="btn primary" id="btnReAct">🧠 ReAct‑советник</button><div id="reactResult"></div>
      <button class="btn" id="btnRandomIdea">💡 Случайная идея</button><div class="preview-box" id="randomIdeaOut" style="margin-top:6px;max-height:80px;"></div>
      <h4>Анализатор отзывов</h4><textarea id="saasReviews" rows="3"></textarea><button class="btn" id="btnAnalyzeReviews">📊 Анализировать</button><div class="preview-box" id="reviewsOut" style="margin-top:6px;max-height:150px;"></div>
    </div></div>
    <div class="tab-content" id="panel-mindmap"><div class="card"><h3>🗺️ Интерактивная карта</h3><svg class="mindmap-svg" id="mindmapSvg" viewBox="0 0 1000 500"></svg></div></div>
    <div class="tab-content" id="panel-builder"><div class="card"><h3>📦 Сборщик проекта</h3>
      <div class="row"><div><label>Название</label><input id="projName"></div><div><label>Клиент</label><input id="projClient"></div></div>
      <label>Описание</label><textarea id="projDesc" rows="2"></textarea>
      <div class="row"><div><label>Цели</label><input id="projGoals"></div><div><label>Инструменты</label><input id="projTools"></div></div>
      <div class="row"><div><label>Сроки</label><input id="projDeadline"></div><div><label>Бюджет</label><input id="projBudget"></div></div>
      <label>Контекст</label><input id="projContext">
      <div class="row"><div><label>Формат</label><select id="projFormat"><option>Документация</option><option>Код</option></select></div><div><label>Заметки</label><input id="projNotes"></div></div>
      <button class="btn success" id="btnSaveProj">💾 Сохранить JSON</button>
      <button class="btn" id="btnLoadProj">📂 Загрузить JSON</button><input type="file" id="projFileInput" accept=".json" style="display:none">
      <button class="btn danger" id="btnClearProj">🗑️ Очистить</button>
      <button class="btn primary" id="btnProjToConstructor">→ В Конструктор</button>
      <div class="inline-msg" id="msgProj"></div>
    </div></div>
    <div class="tab-content" id="panel-summary"><div class="card"><h3>📊 Сводка</h3>
      <div class="grid-3"><div class="metric-card"><div class="val" id="sumMaturity">0</div><div class="lbl">Индекс зрелости</div></div><div class="metric-card"><div class="val" id="sumHealth">0</div><div class="lbl">Здоровье SaaS</div></div><div class="metric-card"><div class="val" id="sumPenta">0</div><div class="lbl">Penta‑Um</div></div></div>
      <div class="progress-bar"><div class="progress-fill" id="sumBar"></div></div>
      <h4>Рекомендации</h4><div id="sumRecommendations"></div>
    </div></div>

  document.getElementById('btnClearProj').addEventListener('click',()=>{
    AppState.data.proj={ name:'', client:'', desc:'', goals:'', tools:'', deadline:'', budget:'', context:'', format:'Документация', notes:'' };
    AppState.set('proj', AppState.data.proj); Object.keys(AppState.data.proj).forEach(k=>{ const el=document.getElementById(k==='format'?'projFormat':'proj'+k.charAt(0).toUpperCase()+k.slice(1)); if(el) el.value=AppState.data.proj[k]; });
  });
  document.getElementById('btnProjToConstructor').addEventListener('click',()=>{
    AppState.set('cRole', AppState.data.proj.name||'Специалист'); AppState.set('cTask', AppState.data.proj.goals||AppState.data.proj.desc);
    AppState.set('cContext', AppState.data.proj.context); AppState.set('cExtra', AppState.data.proj.notes);
    updatePreview(); switchTab('constructor');
  });

  // Summary
  function updateSummary(){
    const checkPct=Math.round(AppState.data.saasChecklist.filter(Boolean).length/12*100);
    let totalRoad=0,doneRoad=0; roadmapStages.forEach((s,si)=>{ totalRoad+=s.tasks.length; for(let ti=0;ti<s.tasks.length;ti++) if(AppState.data.saasRoadmap[si]&(1<<ti)) doneRoad++; });
    const roadPct=Math.round(doneRoad/totalRoad*100);
    const pentaScore=AppState.data.pentaScore||0;
    const pentaPct=Math.round(pentaScore/5*100);
    const cac=parseFloat(AppState.data.saasCac)||0, ltv=parseFloat(AppState.data.saasLtv)||0, ratio=cac?ltv/cac:0;
    const healthPct=Math.min(100,Math.max(10,Math.round(ratio*33+(100-(parseFloat(AppState.data.saasChurn)||0)*3)+(parseFloat(AppState.data.saasConv)||0)*2)));
    const maturity=Math.round((checkPct+roadPct+pentaPct+healthPct)/4);
    document.getElementById('sumMaturity').textContent=maturity;
    document.getElementById('sumHealth').textContent=healthPct;
    document.getElementById('sumPenta').textContent=pentaScore;
    document.getElementById('sumBar').style.width=maturity+'%';
    const recs=[...AppState.data.summaryRecs];
    if(checkPct<50) recs.push('Пройдите чек-лист SaaS');
    if(roadPct<40) recs.push('Продвиньтесь по дорожной карте');
    if(pentaScore<2.5) recs.push('Улучшите план (Penta‑Um)');
    document.getElementById('sumRecommendations').innerHTML=recs.map(r=>'• '+r).join('<br>')||'Нет рекомендаций';
  }
  updateSummary();

  // Guide
  document.getElementById('btnCopyTemplate').addEventListener('click',()=>{
    navigator.clipboard.writeText('Ты — эксперт в [область]. Задача: [описание]. Контекст: [контекст].').then(()=>showMessage('msgGuide','✅ Скопировано','ok'));
  });

  // Workspace
  AppState.bindElement('wsNotes','wsNotes','input');
  document.getElementById('wsFile').addEventListener('change', function(){
    const file=this.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(e){ AppState.set('wsFileContent', e.target.result.substring(0,5000)); document.getElementById('wsFileContent').textContent=AppState.data.wsFileContent; };
    reader.readAsText(file); this.value='';
  });
  document.getElementById('btnWsToConstructor').addEventListener('click',()=>{
    AppState.set('cContext', (AppState.data.cContext+' '+AppState.data.wsNotes).trim());
    if(AppState.data.wsFileContent) AppState.set('cExtra', (AppState.data.cExtra+' [Файл]: '+AppState.data.wsFileContent).trim());
    updatePreview(); switchTab('constructor');
  });
  document.getElementById('btnWsClear').addEventListener('click',()=>{
    AppState.set('wsNotes',''); AppState.set('wsFileContent',''); document.getElementById('wsFileContent').textContent='';
  });

  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click',()=>{
    document.body.classList.toggle('light-theme');
    AppState.set('theme', document.body.classList.contains('light-theme')?'light':'dark');
    renderMindmap();
  });

  // Initial tab activation
  switchTab(AppState.data.activeTab);
})();
</script>
</body>
</html>
